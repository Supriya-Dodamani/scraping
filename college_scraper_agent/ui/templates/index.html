<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🎓 College Scraper UI</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <div class="container">
        <header>
            <h1>🎓 College Info Scraper</h1>
            <p>Search for colleges across India</p>
        </header>

        <main>
            <!-- Search Form -->
            <div class="panel">
                <h2>Search Parameters</h2>
                <form id="searchForm">
                    <div class="form-group">
                        <label for="scope">Search Scope:</label>
                        <select id="scope" name="scope">
                            <option value="country">India (Country-wide)</option>
                            <option value="state">State</option>
                            <option value="city">City</option>
                        </select>
                    </div>

                    <div class="form-group" id="stateGroup" style="display:none;">
                        <label for="state">State:</label>
                        <input type="text" id="state" name="state" placeholder="e.g., Karnataka">
                    </div>

                    <div class="form-group" id="cityGroup" style="display:none;">
                        <label for="city">City:</label>
                        <input type="text" id="city" name="city" placeholder="e.g., Bangalore">
                    </div>

                    <div class="form-group">
                        <label for="courses">Courses:</label>
                        <input type="text" id="courses" name="courses" value="MBA,MCA,BCA,BE,BTech,Diploma">
                    </div>

                    <div class="form-row">
                        <div class="form-group">
                            <label for="maxColleges">Max Colleges:</label>
                            <input type="number" id="maxColleges" name="maxColleges" value="50" min="1" max="500">
                        </div>
                        <div class="form-group">
                            <label for="delay">Delay (seconds):</label>
                            <input type="number" id="delay" name="delay" value="2" min="0" max="30" step="0.5">
                        </div>
                    </div>

                    <button type="submit" class="btn btn-primary">🔍 Start Scraping</button>
                </form>
            </div>

            <!-- Status -->
            <div id="status" class="status" style="display:none;">
                <p id="statusText"></p>
                <div class="progress" id="progressBar"></div>
            </div>

            <!-- Results -->
            <div id="resultsPanel" class="panel" style="display:none;">
                <h2>Results (<span id="resultCount">0</span> colleges)</h2>
                
                <div class="table-wrapper">
                    <table id="resultsTable" class="results-table">
                        <thead>
                            <tr>
                                <th>College Name</th>
                                <th>City</th>
                                <th>Phone</th>
                                <th>Email</th>
                                <th>Website</th>
                            </tr>
                        </thead>
                        <tbody id="tableBody">
                        </tbody>
                    </table>
                </div>

                <div class="actions">
                    <button class="btn btn-secondary" onclick="downloadCSV()">📥 Download CSV</button>
                    <button class="btn btn-secondary" onclick="downloadJSON()">📥 Download JSON</button>
                    <button class="btn btn-secondary" onclick="location.reload()">🔄 New Search</button>
                </div>
            </div>

            <!-- Error Message -->
            <div id="errorPanel" class="error-panel" style="display:none;">
                <p id="errorText"></p>
            </div>
        </main>

        <footer>
            <p>&copy; 2026 College Scraper Agent | AI-Powered College Discovery</p>
        </footer>
    </div>

    <script src="{{ url_for('static', filename='script.js') }}"></script>
</body>
</html>
